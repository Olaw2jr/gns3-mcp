name: Publish to PyPI

# Reusable publishing pipeline: test -> build -> publish.
# Invoked by release-please.yml when a release is cut, or manually via the
# Actions tab (workflow_dispatch). Publishing only happens if the tests pass.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in the repo.
# One-time setup on PyPI: add a trusted publisher for project "gns3-mcp-server" with
#   owner: Olaw2jr, repo: gns3-mcp, workflow: publish.yml, environment: pypi
# (Register the workflow that contains the publish step — this file — even when
# it runs as a reusable workflow.) See https://docs.pypi.org/trusted-publishers/

on:
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Test (gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: python -m pytest -q

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gns3-mcp-server
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
