name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-check the server builds and registers all tools
        run: |
          python - <<'PY'
          import asyncio
          import inspect

          from gns3_mcp.server import build_server

          mcp = build_server()
          getter = getattr(mcp, "get_tools", None)
          if callable(getter):
              result = getter()
              tools = asyncio.run(result) if inspect.isawaitable(result) else result
          else:
              tools = mcp._tool_manager._tools
          assert len(tools) > 100, f"expected >100 tools, got {len(tools)}"
          print("server builds OK:", len(tools), "tools")
          PY
